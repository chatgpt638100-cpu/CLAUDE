# Smart Classroom Monitoring System Configuration

# Face Detection Settings
face_detection_confidence: 0.6

# Face Recognition Settings
model_path: "models/trained_knn_model.pkl"
recognition_threshold: 0.6

# Anti-Proxy Verification Settings
blink_threshold: 0.21
required_blinks: 2                     # If no blink detected with eyes open = proxy attendance

# Behavior Analysis Settings
sleep_ear_threshold: 0.20  # Lower = more sensitive to closed eyes
sleep_frames: 150          # 5 seconds at 30 FPS (5 * 30 = 150 frames)
talk_mar_threshold: 0.35   # FIXED: Detects mouth movement properly
talk_frames: 150           # 5 seconds at 30 FPS (5 * 30 = 150 frames)

# Phone Detection Settings
yolo_model: "yolov8n.pt"
phone_confidence: 0.3      # Lower to detect phones better

# Alert System Configuration
alert_config:
  # Thresholds (in seconds)
  sleep_duration_threshold: 5       # Alert if sleeping > 5 seconds (eyes closed)
  talk_duration_threshold: 5        # Alert if talking > 5 seconds (mouth moving)
  phone_usage_threshold: 1          # Alert immediately when phone detected
  
  # Count thresholds
  max_violations_per_session: 3     # Alert if > 3 violations
  
  # Alert cooldown (seconds)
  alert_cooldown: 60                 # 1 minute between same alerts (reduced for faster response)
  
  # Notification channels
  enable_console_alerts: true
  enable_file_alerts: true
  enable_email_alerts: true          # ENABLED for email notifications
  enable_sound_alerts: true
  
  # Email configuration
  # NOTE: For Gmail, you need to use an "App Password" instead of your regular password
  # To create an App Password:
  # 1. Go to https://myaccount.google.com/security
  # 2. Enable 2-Step Verification if not already enabled
  # 3. Go to https://myaccount.google.com/apppasswords
  # 4. Generate an app password for "Mail"
  # 5. Use that 16-character password below
  email_smtp_server: "smtp.gmail.com"
  email_smtp_port: 587
  email_sender: "srimidhuna47@gmail.com"       # Teacher's email (sender)
  email_password: "YOUR_APP_PASSWORD_HERE"      # Replace with Gmail App Password
  email_recipients: 
    - "srimidhuna47@gmail.com"                  # Teacher email
    - "02midhuna@gmail.com"                     # Parent email

